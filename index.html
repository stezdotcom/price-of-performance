<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Velocity Index · Price of Performance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ============================================================
   PRICE OF PERFORMANCE — Discovery Dashboard
   ============================================================ */

:root {
  --bg-0: #06070A;
  --bg-1: #0B0D12;
  --bg-2: #11141B;
  --bg-3: #1A1E27;
  --line: rgba(255,255,255,0.08);
  --line-strong: rgba(255,255,255,0.16);
  --text-0: #F4F6FA;
  --text-1: #B7BECB;
  --text-2: #6B7385;
  --text-3: #434957;

  --accent: oklch(0.78 0.16 230);          /* cyber blue */
  --accent-glow: oklch(0.78 0.16 230 / 0.45);
  --accent-soft: oklch(0.78 0.16 230 / 0.12);
  --hot: oklch(0.74 0.19 50);              /* racing orange — for value highlights */
  --hot-soft: oklch(0.74 0.19 50 / 0.14);
  --good: oklch(0.78 0.18 145);
  --warn: oklch(0.80 0.17 85);

  --display: "Space Grotesk", "Helvetica Neue", sans-serif;
  --body:    "Inter", "Helvetica Neue", sans-serif;
  --mono:    "JetBrains Mono", ui-monospace, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  background: var(--bg-0);
  color: var(--text-0);
  font-family: var(--body);
  font-feature-settings: "ss01", "cv11";
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ---------- Top frame: persistent topbar ---------- */
.topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 56px; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px;
  background: linear-gradient(180deg, rgba(6,7,10,0.92) 0%, rgba(6,7,10,0.4) 80%, transparent 100%);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.topbar .brand {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--display); font-weight: 700; font-size: 14px; letter-spacing: 0.12em;
  text-transform: uppercase;
}
.topbar .brand .dot {
  width: 8px; height: 8px; background: var(--accent); border-radius: 1px;
  box-shadow: 0 0 12px var(--accent-glow);
}
.topbar .brand-v-logo {
  height: 28px; width: auto; object-fit: contain;
  vertical-align: middle; position: relative; top: -1px;
}
.topbar .brand .sub {
  color: var(--text-2); font-weight: 500; letter-spacing: 0.06em;
}
.topbar nav {
  display: flex; gap: 26px;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text-2);
}
.topbar nav a { color: inherit; text-decoration: none; cursor: pointer; transition: color 150ms; }
.topbar nav a:hover, .topbar nav a.active { color: var(--text-0); }
.topbar nav a.active { color: var(--accent); }

.topbar .meta { font-family: var(--mono); font-size: 11px; color: var(--text-2); letter-spacing: 0.08em; }

/* ---------- Section scaffolding ---------- */
section {
  position: relative;
  width: 100%;
}
.section-tag {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text-2);
}
.section-tag::before {
  content: ""; width: 24px; height: 1px; background: var(--accent);
}

.eyebrow {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--accent);
}

h1, h2, h3 { font-family: var(--display); font-weight: 600; letter-spacing: -0.02em; margin: 0; }

.mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }

/* ---------- Section 1: Hero ---------- */
.hero {
  min-height: 100vh;
  display: grid;
  grid-template-rows: 1fr auto;
  padding: 96px 48px 48px;
  background:
    radial-gradient(ellipse 90% 55% at 50% 38%, oklch(0.78 0.16 230 / 0.28) 0%, transparent 65%),
    var(--bg-0);
  overflow: hidden;
}
.hero-stage {
  display: flex; flex-direction: column;
  align-items: center;
  width: 100%;
}
.hero-headline {
  position: relative;
  display: flex; flex-direction: column; align-items: center;
  text-align: center;
  max-width: 760px;
  padding: 0 24px;
  z-index: 3;
}
.hero-headline > div {
  display: flex; flex-direction: column; align-items: center;
  text-align: center; width: 100%;
}
.hero-headline::before {
  content: "";
  position: absolute; inset: -80% -120%;
  background: radial-gradient(ellipse at 50% 45%, oklch(0.78 0.16 230 / 0.20) 0%, transparent 60%);
  pointer-events: none; z-index: -1;
}
.hero-headline h1 {
  font-size: clamp(42px, 7vw, 104px);
  line-height: 0.98;
  max-width: 16ch;
  text-wrap: balance;
}
.hero-headline h1 .accent { color: var(--accent); }
.hero-headline h1 .strike { position: relative; }
.hero-headline h1 .strike::after {
  content: ""; position: absolute; left: -2%; right: -2%; top: 56%; height: 4px;
  background: var(--hot); transform: scaleX(0); transform-origin: left; transition: transform 800ms 600ms cubic-bezier(.2,.8,.2,1);
}
.hero.in-view .hero-headline h1 .strike::after { transform: scaleX(1); }

.hero-headline p {
  margin-top: 28px;
  font-size: 17px; color: var(--text-1); max-width: 56ch;
  line-height: 1.55; text-align: center;
}


.hero-cta {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 32px;
  z-index: 4; position: relative;
}
.cta-btn {
  display: inline-flex; align-items: center; gap: 14px;
  padding: 18px 28px;
  background: var(--accent);
  color: #001220;
  border: none; cursor: pointer;
  font-family: var(--mono); font-size: 12px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  border-radius: 2px;
  transition: transform 200ms, box-shadow 200ms;
  box-shadow: 0 0 0 1px var(--accent), 0 12px 40px var(--accent-glow);
}
.cta-btn:hover { transform: translateY(-2px); box-shadow: 0 0 0 1px var(--accent), 0 18px 60px var(--accent-glow); }
.cta-btn .arrow { font-size: 14px; }

.cta-side {
  display: flex; gap: 36px;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--text-2);
}
.cta-side .stat strong { display: block; font-size: 22px; color: var(--text-0); margin-top: 6px; letter-spacing: 0; }

.hero-scroll-hint {
  position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--text-2);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.hero-scroll-hint .line {
  width: 1px; height: 28px;
  background: linear-gradient(180deg, var(--text-2), transparent);
  animation: scrollHint 2s ease-in-out infinite;
}
@keyframes scrollHint {
  0% { transform: scaleY(0); transform-origin: top; }
  50% { transform: scaleY(1); transform-origin: top; }
  51% { transform: scaleY(1); transform-origin: bottom; }
  100% { transform: scaleY(0); transform-origin: bottom; }
}

/* ---------- Car Render placeholder ---------- */
.car-render {
  position: relative;
  width: 100%; height: 100%;
  background:
    repeating-linear-gradient(
      135deg,
      transparent 0 18px,
      rgba(255,255,255,0.025) 18px 19px
    ),
    linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
  border: 1px solid var(--line);
  display: grid; grid-template-rows: 1fr auto;
  overflow: hidden;
}
.car-render::before {
  content: "";
  position: absolute; inset: auto 8% 8% 8%; height: 6px;
  background: radial-gradient(ellipse, rgba(255,255,255,0.18), transparent 60%);
  filter: blur(6px);
}
.car-render .render-label {
  align-self: center; justify-self: center;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em;
  color: var(--text-3); text-transform: uppercase;
  display: flex; gap: 12px; align-items: center;
}
.car-render .render-label .br { color: var(--accent); }
.car-render .render-meta {
  display: flex; justify-content: space-between;
  padding: 12px 16px; border-top: 1px solid var(--line);
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--text-2);
  background: rgba(0,0,0,0.3);
}
.car-render .render-meta .ok { color: var(--accent); }

/* corner ticks */
.car-render .tick {
  position: absolute; width: 14px; height: 14px;
  border: 1px solid var(--accent);
}
.car-render .tick.tl { top: 10px; left: 10px; border-right: 0; border-bottom: 0; }
.car-render .tick.tr { top: 10px; right: 10px; border-left: 0; border-bottom: 0; }
.car-render .tick.bl { bottom: 38px; left: 10px; border-right: 0; border-top: 0; }
.car-render .tick.br { bottom: 38px; right: 10px; border-left: 0; border-top: 0; }
.car-render-img {
  width: 100%; height: 100%;
  object-fit: contain; object-position: center;
  padding: 8px 16px; grid-row: 1;
}

/* ---------- Generic section header ---------- */
.section-head {
  padding: 120px 48px 56px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: end;
  border-top: 1px solid var(--line);
}
.section-head h2 {
  font-size: clamp(36px, 4.6vw, 64px);
  line-height: 1.02;
  text-wrap: balance;
}
.section-head .lede {
  color: var(--text-1); font-size: 17px; line-height: 1.6; max-width: 52ch;
}
.section-head .index {
  font-family: var(--mono); font-size: 11px; color: var(--text-2);
  letter-spacing: 0.2em; text-transform: uppercase;
  margin-bottom: 20px;
}

/* ---------- Section 2: Paradox ---------- */
.paradox {
  padding-bottom: 120px;
}
.paradox-grid {
  display: grid; grid-template-columns: 1fr auto 1fr;
  gap: 0;
  margin: 0 48px;
  border: 1px solid var(--line);
  background: var(--bg-1);
}
.paradox-card {
  padding: 36px;
  display: flex; flex-direction: column; gap: 24px;
  position: relative;
  transition: background 250ms;
}
.paradox-card:hover { background: var(--bg-2); }
.paradox-card .row { display: flex; justify-content: space-between; align-items: baseline; }
.paradox-card .name { font-family: var(--display); font-size: 28px; font-weight: 600; }
.paradox-card .maker { font-family: var(--mono); font-size: 11px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.18em; }
.paradox-card .price { font-family: var(--mono); font-size: 22px; font-variant-numeric: tabular-nums; }
.paradox-card .render { aspect-ratio: 16/9; }
.paradox-card .stats { display: flex; flex-direction: column; gap: 14px; }

.stat-bar { display: grid; grid-template-columns: 80px 1fr 40px; gap: 14px; align-items: center; }
.stat-bar .label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; color: var(--text-2); text-transform: uppercase; }
.stat-bar .track { height: 8px; background: var(--bg-3); border: 1px solid var(--line); position: relative; }
.stat-bar .fill { position: absolute; inset: 0 auto 0 0; background: var(--text-0); transition: width 800ms cubic-bezier(.2,.8,.2,1); }
.stat-bar.tied .fill { background: var(--hot); box-shadow: 0 0 12px var(--hot-soft); }
.stat-bar .num { font-family: var(--mono); font-size: 13px; text-align: right; font-variant-numeric: tabular-nums; }

.paradox-divider {
  width: 1px;
  background: var(--line);
  position: relative;
  z-index: 10;
}
.paradox-divider .vs {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--bg-0); border: 1px solid var(--accent);
  display: grid; place-items: center;
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.18em; color: var(--accent);
  box-shadow: 0 0 30px var(--accent-glow);
}

.paradox-takeaway {
  margin: 36px 48px 0;
  padding: 28px 36px;
  border: 1px solid var(--line);
  border-left: 3px solid var(--hot);
  display: grid; grid-template-columns: auto 1fr auto; gap: 36px; align-items: center;
}
.paradox-takeaway .badge {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--hot); padding: 6px 10px; border: 1px solid var(--hot); border-radius: 2px;
}
.paradox-takeaway .delta { font-family: var(--mono); font-size: 32px; font-weight: 600; color: var(--hot); }
.paradox-takeaway .copy { color: var(--text-1); font-size: 15px; line-height: 1.5; max-width: 64ch; }

/* ---------- Section 3: Class breakdown ---------- */
.classes {
  padding: 0 48px 120px;
}
.class-toolbar {
  display: flex; flex-direction: column; align-items: flex-start; gap: 12px;
  border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
  padding: 16px 0;
  margin-bottom: 24px;
}
.class-tabs {
  display: flex; gap: 4px;
  overflow-x: auto; flex-wrap: nowrap; width: 100%;
  padding-bottom: 4px;
  scrollbar-width: thin; scrollbar-color: var(--line-strong) transparent;
}
.class-tabs::-webkit-scrollbar { height: 2px; }
.class-tabs::-webkit-scrollbar-track { background: transparent; }
.class-tabs::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 1px; }
.class-tabs button {
  background: transparent; border: 1px solid var(--line);
  color: var(--text-2); cursor: pointer;
  padding: 10px 18px;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em;
  text-transform: uppercase;
  transition: all 180ms;
}
.class-tabs button:hover { color: var(--text-0); border-color: var(--line-strong); }
.class-tabs button.active { background: var(--accent); color: #001220; border-color: var(--accent); }
.class-meta { font-family: var(--mono); font-size: 11px; color: var(--text-2); letter-spacing: 0.14em; }

.class-rows { display: flex; flex-direction: column; }
.class-row {
  display: grid; grid-template-columns: 28px 220px 1fr 80px 140px;
  align-items: center; gap: 24px;
  padding: 22px 0;
  border-bottom: 1px solid var(--line);
  transition: background 200ms;
}
.class-row:hover { background: var(--bg-1); }
.class-row .rank { font-family: var(--mono); font-size: 11px; color: var(--text-3); }
.class-row .name { font-family: var(--display); font-size: 18px; font-weight: 500; }
.class-row .maker-cls {
  display: block; margin-top: 4px;
  font-family: var(--mono); font-size: 10px; color: var(--text-2);
  letter-spacing: 0.16em; text-transform: uppercase;
}
.class-row .bar-wrap { position: relative; height: 22px; background: var(--bg-2); border: 1px solid var(--line); }
.class-row .bar-fill {
  position: absolute; inset: 0 auto 0 0;
  background: linear-gradient(90deg, var(--accent), oklch(0.78 0.16 200));
  transition: width 800ms cubic-bezier(.2,.8,.2,1);
}
.class-row .bar-mark { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.06); }
.class-row .top { font-family: var(--mono); font-size: 18px; font-variant-numeric: tabular-nums; text-align: right; }
.class-row .price { font-family: var(--mono); font-size: 13px; color: var(--text-2); text-align: right; font-variant-numeric: tabular-nums; }
.class-row.leader .name { color: var(--accent); }
.class-row.leader .bar-fill { background: linear-gradient(90deg, var(--hot), oklch(0.78 0.16 100)); box-shadow: 0 0 18px var(--hot-soft); }


/* ---------- Section 4: Discovery (Asphalt 8 inspired) ---------- */
.discovery {
  padding: 0 0 160px;
  border-top: 1px solid var(--line);
}
.discovery-head {
  padding: 96px 48px 48px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: end;
}
.discovery-head h2 { font-size: clamp(36px, 4.6vw, 60px); line-height: 1.02; }
.discovery-head .lede { color: var(--text-1); font-size: 16px; line-height: 1.6; max-width: 50ch; }

/* New Asphalt-style stage: car centerpiece + radar top-right + sliders bottom */
.discovery-shell {
  margin: 0 48px;
  border: 1px solid var(--line);
  background:
    radial-gradient(ellipse 70% 50% at 38% 45%, oklch(0.78 0.16 230 / 0.16) 0%, transparent 60%),
    var(--bg-1);
  display: grid;
  grid-template-rows: minmax(520px, auto) auto auto;
}

.stage-row {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  min-height: 520px;
  border-bottom: 1px solid var(--line);
}

/* Centerpiece car */
.centerpiece {
  position: relative;
  padding: 48px 56px 48px 48px;
  display: flex; flex-direction: column; justify-content: space-between;
  border-right: 1px solid var(--line);
}
.centerpiece .cp-meta {
  display: flex; justify-content: space-between; align-items: flex-start;
}
.centerpiece .cp-tag {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--hot);
  padding: 6px 12px; border: 1px solid var(--hot); border-radius: 2px;
}
.centerpiece .cp-tag .pulse {
  width: 6px; height: 6px; background: var(--hot); border-radius: 50%;
  box-shadow: 0 0 10px var(--hot);
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(.7); } }
.centerpiece .cp-id { font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em; color: var(--text-2); text-transform: uppercase; }

.centerpiece .cp-stage {
  flex: 1;
  display: grid; place-items: center;
  position: relative;
  margin: 24px 0;
}
.centerpiece .cp-render {
  width: 100%; aspect-ratio: 16/9;
  position: relative;
  animation: cpFloat 4s ease-in-out infinite;
}
@keyframes cpFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

/* annotation bubbles around centerpiece */
.cp-bubble {
  position: absolute;
  background: var(--bg-0);
  border: 1px solid var(--accent);
  padding: 8px 14px;
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-0);
  box-shadow: 0 0 20px var(--accent-glow);
  z-index: 4;
  white-space: nowrap;
}
.cp-bubble::before {
  content: ""; position: absolute; width: 8px; height: 8px;
  border: 1px solid var(--accent); background: var(--bg-0);
  transform: rotate(45deg);
}
.cp-bubble.top-left { top: 12%; left: -10px; }
.cp-bubble.top-left::before { right: -5px; top: 50%; transform: translateY(-50%) rotate(45deg); border-left: 0; border-top: 0; }
.cp-bubble.top-right { top: 18%; right: -10px; }
.cp-bubble.top-right::before { left: -5px; top: 50%; transform: translateY(-50%) rotate(45deg); border-right: 0; border-bottom: 0; }
.cp-bubble.bot-left { bottom: 22%; left: -10px; }
.cp-bubble.bot-left::before { right: -5px; top: 50%; transform: translateY(-50%) rotate(45deg); border-left: 0; border-top: 0; }
.cp-bubble .accent { color: var(--accent); margin-right: 6px; }
.cp-bubble .hot { color: var(--hot); }

.centerpiece .cp-foot {
  display: flex; justify-content: space-between; align-items: flex-end;
  gap: 24px;
}
.centerpiece .cp-name {
  font-family: var(--display); font-size: clamp(32px, 3.6vw, 52px);
  font-weight: 600; line-height: 1; letter-spacing: -0.02em;
}
.centerpiece .cp-maker {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text-2); margin-bottom: 12px;
}
.centerpiece .cp-price-block { text-align: right; }
.centerpiece .cp-price-lbl {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text-2);
}
.centerpiece .cp-price {
  font-family: var(--mono); font-size: 36px; font-weight: 600;
  font-variant-numeric: tabular-nums; color: var(--accent);
  margin-top: 6px;
}
.centerpiece .cp-vps {
  font-family: var(--mono); font-size: 11px; color: var(--hot);
  letter-spacing: 0.14em; margin-top: 4px;
}

/* Right-side: radar/spec chart */
.spec-panel {
  padding: 36px;
  display: flex; flex-direction: column; gap: 20px;
  background: var(--bg-1);
}
.spec-head {
  display: flex; justify-content: space-between; align-items: baseline;
  padding-bottom: 14px; border-bottom: 1px solid var(--line);
}
.spec-head .title {
  font-family: var(--display); font-weight: 600; font-size: 14px;
  letter-spacing: 0.06em; text-transform: uppercase;
}
.spec-head .sub { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; color: var(--text-2); text-transform: uppercase; }

.radar-wrap {
  position: relative;
  aspect-ratio: 1;
  max-width: 320px;
  margin: 0 auto;
  width: 100%;
}
.radar-wrap svg { width: 100%; height: 100%; overflow: visible; }
.radar-grid { stroke: var(--line); fill: none; }
.radar-grid-strong { stroke: var(--line-strong); fill: none; }
.radar-axis { stroke: var(--line); stroke-dasharray: 2 4; }
.radar-fill { fill: var(--accent-soft); stroke: var(--accent); stroke-width: 1.5; transition: all 600ms cubic-bezier(.2,.8,.2,1); }
.radar-point { fill: var(--accent); }
.radar-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em;
  fill: var(--text-1); text-transform: uppercase;
}
.radar-num {
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  fill: var(--accent);
}

.spec-stats {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
  padding-top: 14px; border-top: 1px solid var(--line);
}
.spec-stats .ss {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px; background: var(--bg-2); border: 1px solid var(--line);
}
.spec-stats .ss .l { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; color: var(--text-2); text-transform: uppercase; }
.spec-stats .ss .v { font-family: var(--mono); font-size: 16px; font-weight: 600; font-variant-numeric: tabular-nums; }

/* Sliders row — full-width below stage */
.slider-row {
  padding: 32px 48px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 32px;
  border-bottom: 1px solid var(--line);
  background: var(--bg-1);
}
.slider-row .slider-head-block {
  display: flex; justify-content: space-between; align-items: center;
  grid-column: 1 / -1;
  padding-bottom: 18px; border-bottom: 1px solid var(--line);
  margin-bottom: 4px;
}
.slider-row .slider-head-block .t {
  font-family: var(--display); font-size: 14px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
}
.slider-row .slider-head-block .reset {
  background: transparent; border: 1px solid var(--line);
  color: var(--text-2); padding: 8px 14px;
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em;
  text-transform: uppercase; cursor: pointer;
}
.slider-row .slider-head-block .reset:hover { color: var(--accent); border-color: var(--accent); }

/* Alternatives carousel */
.alt-row {
  padding: 28px 48px 36px;
}
.alt-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.alt-head .t { font-family: var(--display); font-size: 14px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
.alt-head .meta { font-family: var(--mono); font-size: 11px; color: var(--text-2); letter-spacing: 0.14em; text-transform: uppercase; }
.alt-head .meta strong { color: var(--accent); }
.alt-head .sort { display: flex; gap: 4px; }
.alt-head .sort button {
  background: transparent; border: 1px solid var(--line);
  color: var(--text-2); padding: 7px 12px;
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  cursor: pointer;
}
.alt-head .sort button.active { background: var(--bg-3); color: var(--text-0); border-color: var(--line-strong); }

.alt-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}
.alt-card {
  border: 1px solid var(--line);
  background: var(--bg-2);
  padding: 12px;
  display: flex; flex-direction: column; gap: 8px;
  cursor: pointer;
  transition: all 200ms cubic-bezier(.2,.8,.2,1);
  position: relative;
  animation: cardIn 320ms cubic-bezier(.2,.8,.2,1) backwards;
}
.alt-card:hover {
  border-color: var(--accent);
  background: var(--bg-3);
  transform: translateY(-2px);
}
.alt-card.selected {
  border-color: var(--accent);
  background: linear-gradient(180deg, var(--accent-soft), var(--bg-2));
  box-shadow: 0 0 0 1px var(--accent), 0 0 24px var(--accent-glow);
}
.alt-card .alt-render { aspect-ratio: 16/9; }
.alt-card .alt-name { font-family: var(--display); font-size: 12px; font-weight: 600; line-height: 1.2; }
.alt-card .alt-row-meta { display: flex; justify-content: space-between; align-items: baseline; }
.alt-card .alt-price { font-family: var(--mono); font-size: 11px; font-variant-numeric: tabular-nums; }
.alt-card .alt-cls { font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-2); }
.alt-card .alt-stats { display: flex; gap: 8px; padding-top: 6px; border-top: 1px solid var(--line); }
.alt-card .alt-stats .x { font-family: var(--mono); font-size: 10px; color: var(--text-1); }
.alt-card .alt-stats .x b { color: var(--accent); font-weight: 600; }

.scale-panel {
  padding: 32px 28px;
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column; gap: 28px;
  background: var(--bg-1);
}
.scale-panel .panel-header {
  display: flex; justify-content: space-between; align-items: baseline;
  padding-bottom: 14px; border-bottom: 1px solid var(--line);
}
.scale-panel .panel-title {
  font-family: var(--display); font-size: 16px; font-weight: 600;
  letter-spacing: 0.04em; text-transform: uppercase;
}
.scale-panel .reset {
  background: transparent; border: 0; cursor: pointer;
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text-2);
}
.scale-panel .reset:hover { color: var(--accent); }

.scrubber { display: flex; flex-direction: column; gap: 12px; }
.scrubber .hd { display: flex; justify-content: space-between; align-items: center; }
.scrubber .hd-l { display: flex; gap: 10px; align-items: center; }
.scrubber .icon {
  width: 26px; height: 26px; display: grid; place-items: center;
  border: 1px solid var(--line);
  font-family: var(--mono); font-size: 11px; color: var(--accent);
}
.scrubber .name {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--text-1);
}
.scrubber .value { font-family: var(--mono); font-size: 12px; font-variant-numeric: tabular-nums; }

.range-track {
  position: relative; height: 28px; cursor: pointer;
  user-select: none;
}
.range-track .axis {
  position: absolute; top: 50%; left: 0; right: 0; height: 2px;
  background: var(--bg-3); transform: translateY(-50%);
}
.range-track .axis-fill {
  position: absolute; top: 50%; height: 2px;
  background: var(--accent); transform: translateY(-50%);
  box-shadow: 0 0 10px var(--accent-glow);
}
.range-track .handle {
  position: absolute; top: 50%; transform: translate(-50%, -50%);
  width: 14px; height: 14px; background: var(--text-0);
  border: 2px solid var(--accent);
  border-radius: 2px;
  box-shadow: 0 0 14px var(--accent-glow);
  cursor: grab;
}
.range-track .handle:active { cursor: grabbing; }
.range-track .ticks { position: absolute; inset: 0; pointer-events: none; }
.range-track .ticks span {
  position: absolute; bottom: 4px; width: 1px; height: 6px; background: var(--text-3);
}

.scrubber .scale-min-max {
  display: flex; justify-content: space-between;
  font-family: var(--mono); font-size: 10px; color: var(--text-3); letter-spacing: 0.12em;
}

.scale-readout {
  margin-top: auto;
  padding-top: 20px;
  border-top: 1px solid var(--line);
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
}
.scale-readout .stat {
  display: flex; flex-direction: column; gap: 4px;
}
.scale-readout .lbl { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; color: var(--text-2); text-transform: uppercase; }
.scale-readout .val { font-family: var(--mono); font-size: 18px; font-variant-numeric: tabular-nums; }
.scale-readout .val.hot { color: var(--hot); }

/* Results panel */
.results-panel { padding: 28px 32px; display: flex; flex-direction: column; gap: 20px; min-height: 0; }
.results-toolbar {
  display: flex; justify-content: space-between; align-items: center;
  padding-bottom: 14px; border-bottom: 1px solid var(--line);
}
.results-toolbar .count { font-family: var(--mono); font-size: 12px; letter-spacing: 0.14em; color: var(--text-1); text-transform: uppercase; }
.results-toolbar .count strong { color: var(--accent); font-weight: 600; }
.results-toolbar .sort { display: flex; gap: 4px; }
.results-toolbar .sort button {
  background: transparent; border: 1px solid var(--line);
  color: var(--text-2); padding: 7px 12px;
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  cursor: pointer;
}
.results-toolbar .sort button.active { background: var(--bg-3); color: var(--text-0); border-color: var(--line-strong); }

.results-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
  align-content: start;
}
.result-card {
  border: 1px solid var(--line);
  background: var(--bg-2);
  padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
  cursor: pointer;
  transition: all 220ms cubic-bezier(.2,.8,.2,1);
  position: relative;
  animation: cardIn 320ms cubic-bezier(.2,.8,.2,1) backwards;
}
@keyframes cardIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.result-card:hover {
  border-color: var(--accent);
  background: var(--bg-3);
  transform: translateY(-2px);
}
.result-card.best {
  border-color: var(--hot);
  background: linear-gradient(180deg, var(--hot-soft), var(--bg-2));
}
.result-card.best .best-tag {
  position: absolute; top: 0; right: 0;
  background: var(--hot); color: #1a0900;
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em;
  padding: 4px 10px; text-transform: uppercase;
}
.result-card .card-render { aspect-ratio: 16/9; }
.result-card .card-name { font-family: var(--display); font-size: 14px; font-weight: 600; line-height: 1.2; }
.result-card .card-row { display: flex; justify-content: space-between; align-items: baseline; }
.result-card .card-price { font-family: var(--mono); font-size: 12px; font-variant-numeric: tabular-nums; }
.result-card .card-cls { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-2); }
.result-card .card-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding-top: 8px; border-top: 1px solid var(--line); }
.result-card .ministat { display: flex; flex-direction: column; gap: 3px; }
.result-card .ministat .lbl { font-family: var(--mono); font-size: 8px; letter-spacing: 0.14em; color: var(--text-3); text-transform: uppercase; }
.result-card .ministat .v { font-family: var(--mono); font-size: 13px; font-variant-numeric: tabular-nums; }
.result-card .vps { font-family: var(--mono); font-size: 10px; color: var(--text-2); letter-spacing: 0.1em; }
.result-card .vps b { color: var(--hot); }

.empty {
  grid-column: 1 / -1;
  padding: 80px 0;
  text-align: center;
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.18em;
  color: var(--text-3); text-transform: uppercase;
}

/* ---------- Footer ---------- */
.foot {
  padding: 56px 48px 36px;
  border-top: 1px solid var(--line);
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; color: var(--text-2);
  text-transform: uppercase;
}

/* ---------- Reveal ---------- */
.reveal { opacity: 0; transform: translateY(20px); transition: opacity 700ms cubic-bezier(.2,.8,.2,1), transform 700ms cubic-bezier(.2,.8,.2,1); }
.reveal.in { opacity: 1; transform: translateY(0); }

/* ---------- Misc ---------- */
.scanline {
  pointer-events: none; position: fixed; inset: 0; z-index: 0;
  background: repeating-linear-gradient(0deg, transparent 0 3px, rgba(255,255,255,0.012) 3px 4px);
  mix-blend-mode: overlay;
}

/* ============================================================

const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ---------- Format helpers ---------- */
function fmtPrice(n) {
  if (n >= 1000000) return "$" + (n / 1000000).toFixed(n % 1000000 === 0 ? 0 : 2) + "M";
  if (n >= 1000) return "$" + (n / 1000).toFixed(0) + "K";
  return "$" + n.toLocaleString();
}
function fmtPriceFull(n) {
  return "$" + n.toLocaleString();
}
function pad(n, width) {

/* ---------- Car image URLs ---------- */
/* GTA V internal spawn name → GitHub repo filename (for vehicles whose data ID

const GH_MAP = {

  "phantomwedge":"phantom2","piwasserdominator":"dominator3","primocustom":"primo2",

/* GTABase uses shorter slugs for some vehicles (e.g. strips "(Formula 1 Car)" suffix) */
const GB_SLUG = {
  "dr1indycar":"dr1","br8formula1car":"br8","pr4formula1car":"pr4","r88formula1car":"r88",
};

function vehicleImgGithub(car) {
  const repoId = GH_MAP[car.id] || car.id;
  return `https://raw.githubusercontent.com/MericcaN41/gta5carimages/main/images/${repoId}.png`;
}
function vehicleImgGtabase(car) {
  const cls = car.cls.toLowerCase().replace(/\s+/g, '-');
  const name = GB_SLUG[car.id] || car.name.toLowerCase()
    .replace(/\s+/g, '-')
    .replace(/[()]/g, '')
    .replace(/-+/g, '-')
    .replace(/-+$/, '');
  return `https://www.gtabase.com/images/jch-optimize/ng/images_gta-5_vehicles_${cls}_main_${name}.webp`;
}

/* ---------- Car Render ---------- */
function CarRender({ code, status = "READY", angle = "3/4 FRONT", car = null }) {
  const githubUrl = car ? vehicleImgGithub(car) : null;
  const gtabaseUrl = car ? vehicleImgGtabase(car) : null;
  return (
    <div className="car-render">
      <span className="tick tl"></span>
      <span className="tick tr"></span>
      <span className="tick bl"></span>
      <span className="tick br"></span>
      {githubUrl ? (
        <img src={githubUrl} alt={car.name} className="car-render-img"
          referrerPolicy="no-referrer"
          onError={(e) => {
            const el = e.currentTarget;
            if (!el.dataset.fallback) {
              el.dataset.fallback = '1';
              el.src = gtabaseUrl;
            } else {
              el.style.display = 'none';

        <span className="ok">● {status}</span>
      </div>
    </div>
  );

/* ---------- Scrubber (price/speed/handling/braking) ---------- */
function Scrubber({ icon, label, min, max, step = 1, value, onChange, format, ticks = 10 }) {
  const trackRef = useRef(null);
  const [dragging, setDragging] = useState(false);
  const pct = ((value - min) / (max - min)) * 100;

  const handleMove = useCallback((clientX) => {
    const el = trackRef.current; if (!el) return;
    const r = el.getBoundingClientRect();
    const ratio = Math.min(1, Math.max(0, (clientX - r.left) / r.width));
    const raw = min + ratio * (max - min);
    const stepped = Math.round(raw / step) * step;
    onChange(Math.min(max, Math.max(min, stepped)));
  }, [min, max, step, onChange]);

  useEffect(() => {
    if (!dragging) return;
    const onMove = (e) => handleMove(e.clientX);
    const onUp = () => setDragging(false);
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
    return () => {
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
    };
  }, [dragging, handleMove]);

  const tickEls = [];
  for (let i = 0; i <= ticks; i++) {
    tickEls.push(<span key={i} style={{ left: `${(i / ticks) * 100}%` }}></span>);
  }

  return (
    <div className="scrubber">
      <div className="hd">
        <div className="hd-l">
          <div className="icon">{icon}</div>
          <div className="name">{label}</div>
        </div>
        <div className="value">{format ? format(value) : value}</div>
      </div>
      <div
        className="range-track"
        ref={trackRef}
        onPointerDown={(e) => { setDragging(true); handleMove(e.clientX); }}
      >
        <div className="axis"></div>
        <div className="axis-fill" style={{ width: `${pct}%` }}></div>
        <div className="ticks">{tickEls}</div>
        <div className="handle" style={{ left: `${pct}%` }}></div>
      </div>
      <div className="scale-min-max">
        <span>{format ? format(min) : min}</span>
        <span>{format ? format(max) : max}</span>
      </div>
    </div>
  );
}

/* Reveal-on-scroll wrapper */
function Reveal({ children, delay = 0, as: As = "div", className = "" }) {
  const ref = useRef(null);
  const [seen, setSeen] = useState(false);
  useEffect(() => {
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setSeen(true); io.disconnect(); }
    }, { threshold: 0, rootMargin: "0px 0px -10% 0px" });
    if (ref.current) io.observe(ref.current);
    return () => io.disconnect();
  }, []);
  return (
    <As ref={ref} className={`reveal ${seen ? "in" : ""} ${className}`} style={{ transitionDelay: `${delay}ms` }}>
      {children}
    </As>
  );
}

/* ---------- Section 2: Paradox ---------- */
function ParadoxBar({ label, value, max = 100, tied = false, delay = 0 }) {
  const [w, setW] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {
        setTimeout(() => setW((value / max) * 100), delay);
        io.disconnect();
      }
    }, { threshold: 0.4 });
    if (ref.current) io.observe(ref.current);
    return () => io.disconnect();
  }, [value, max, delay]);
  return (
    <div className={`stat-bar ${tied ? "tied" : ""}`} ref={ref}>
      <span className="label">{label}</span>
      <span className="track"><span className="fill" style={{ width: `${w}%` }}></span></span>
      <span className="num">{value}</span>
    </div>
  );
}

function Classes() {
  const [cls, setCls] = useState("All");
  const [metric] = useState("speed");
  const tabs = ["All", ...window.CLASSES];

  const filtered = useMemo(() => {
    const list = cls === "All" ? window.VEHICLES : window.VEHICLES.filter(c => c.cls === cls);
    return [...list].sort((a, b) => b[metric] - a[metric]).slice(0, 10);
  }, [cls, metric]);

  const byClass = useMemo(() => {
    if (cls !== "All") return null;
    return window.CLASSES.map(c => {
      const top = [...window.VEHICLES.filter(v => v.cls === c)].sort((a,b) => b[metric] - a[metric])[0];
      return top;
    }).filter(Boolean).sort((a,b) => b[metric] - a[metric]);
  }, [cls, metric]);

  const rows = byClass || filtered;
  const max = Math.max(...rows.map(r => r[metric]));

  return (
    <section id="classes" className="classes">
      <div className="section-head">
        <div>
          <div className="index">03 / Class Breakdown</div>
          <Reveal as="h2">"Super" does not mean "Fastest"</Reveal>
        </div>
        <Reveal as="p" className="lede" delay={120}>
          Sports class cars very often match and occasionally exceed the top speeds of super class cars at a fraction of the price.
          Filter by class to see the leaderboard.
        </Reveal>
      </div>

      <Reveal>
        <div className="class-toolbar">
          <div className="class-tabs">
            {tabs.map(t => (
              <button key={t} className={cls === t ? "active" : ""} onClick={() => setCls(t)}>
                {t === "All" ? "Fastest by Class" : t}
              </button>
            ))}
          </div>
          <div className="class-meta">
            METRIC · TOP SPEED · DESC ◦ {rows.length} ROWS
          </div>
        </div>
      </Reveal>

      <Reveal>
        <div className="class-rows">
          {rows.map((r, i) => (
            <div key={r.id} className={`class-row ${i === 0 ? "leader" : ""}`}>
              <span className="rank">{pad(i + 1, 2)}</span>
              <div>
                <div className="name">{r.name}</div>
                <span className="maker-cls">{r.maker} · {r.cls}</span>
              </div>
              <div className="bar-wrap">
                {[20,40,60,80].map(p => <span key={p} className="bar-mark" style={{ left: `${p}%` }}></span>)}
                <span className="bar-fill" style={{ width: `${(r[metric] / max) * 100}%` }}></span>
              </div>
              <span className="top">{r[metric]}</span>
              <span className="price">{fmtPriceFull(r.price)}</span>
            </div>
          ))}
        </div>
      </Reveal>
    </section>
  );
}

/* ---------- Radar chart ---------- */
function RadarChart({ car }) {
  if (!car) return null;
  const stats = [
    { key: "speed", label: "SPEED", value: car.speed },
    { key: "accel", label: "ACCEL", value: car.accel },
    { key: "handling", label: "HAND", value: car.handling },
    { key: "braking", label: "BRAKE", value: car.braking },
  ];
  const cx = 150, cy = 150, R = 110;
  const angle = (i) => (-Math.PI / 2) + (i * 2 * Math.PI / stats.length);
  const point = (i, v) => {
    const r = R * (v / 100);
    return [cx + r * Math.cos(angle(i)), cy + r * Math.sin(angle(i))];
  };
  const labelPos = (i) => {
    const r = R + 22;
    return [cx + r * Math.cos(angle(i)), cy + r * Math.sin(angle(i))];
  };
  const valPos = (i, v) => {
    const r = R * (v / 100) + 10;
    return [cx + r * Math.cos(angle(i)), cy + r * Math.sin(angle(i))];
  };
  const pts = stats.map((s, i) => point(i, s.value));
  const polyPts = pts.map(p => p.join(",")).join(" ");

  return (
    <svg viewBox="0 0 300 300">
      {/* concentric grid */}
      {[0.25, 0.5, 0.75, 1].map((s, i) => (
        <polygon
          key={i}
          className={i === 3 ? "radar-grid-strong" : "radar-grid"}
          points={stats.map((_, j) => {
            const r = R * s;
            return [cx + r * Math.cos(angle(j)), cy + r * Math.sin(angle(j))].join(",");
          }).join(" ")}
        />
      ))}
      {/* axes */}
      {stats.map((_, i) => {
        const [x, y] = point(i, 100);
        return <line key={i} className="radar-axis" x1={cx} y1={cy} x2={x} y2={y} />;
      })}
      {/* data fill */}
      <polygon className="radar-fill" points={polyPts} />
      {/* points */}
      {pts.map(([x, y], i) => <circle key={i} className="radar-point" cx={x} cy={y} r="3" />)}
      {/* labels */}
      {stats.map((s, i) => {
        const [lx, ly] = labelPos(i);
        const [vx, vy] = valPos(i, s.value);
        return (
          <g key={s.key}>
            <text className="radar-label" x={lx} y={ly} textAnchor="middle" dominantBaseline="middle">{s.label}</text>
            <text className="radar-num" x={vx} y={vy} textAnchor="middle" dominantBaseline="middle">{s.value}</text>
          </g>
        );
      })}
    </svg>
  );
}

/* ---------- Discovery ---------- */
const DEFAULTS = {
  priceMax: 5000000,
  speedMin: 0,
  handlingMin: 0,
  brakingMin: 0,
};

function Discovery() {
  const [s, setS] = useState(DEFAULTS);
  const [sortBy, setSortBy] = useState("value");
  const [selectedId, setSelectedId] = useState(null);

  const update = (k, v) => setS(prev => ({ ...prev, [k]: v }));
  const reset = () => { setS(DEFAULTS); setSelectedId(null); };

  const results = useMemo(() => {
    const filtered = window.VEHICLES.filter(c =>
      c.price <= s.priceMax &&
      c.speed >= s.speedMin &&
      c.handling >= s.handlingMin &&
      c.braking >= s.brakingMin
    ).map(c => ({
      ...c,
      value: ((c.speed + c.handling + c.braking) / 3) / Math.max(0.05, c.price / 1000000)
    }));

    if (sortBy === "value") filtered.sort((a, b) => b.value - a.value);
    else if (sortBy === "price") filtered.sort((a, b) => a.price - b.price);
    else if (sortBy === "speed") filtered.sort((a, b) => b.speed - a.speed);
    return filtered;
  }, [s, sortBy]);

  // Auto-select best when filters change & user hasn't picked
  const selected = useMemo(() => {
    if (selectedId) {
      const m = results.find(r => r.id === selectedId);
      if (m) return m;
    }
    return results[0];
  }, [results, selectedId]);

  // Reset selected when it falls out of filter
  useEffect(() => {
    if (selectedId && !results.find(r => r.id === selectedId)) setSelectedId(null);
  }, [results, selectedId]);

  return (
    <section id="discovery" className="discovery">
      <div className="discovery-head">
        <div>
          <div className="index">04 / The Discovery Tool</div>
          <Reveal as="h2">Configure your car.<br/>Meet your match.</Reveal>
        </div>
        <Reveal as="p" className="lede" delay={120}>
          Set the budget. Set the floor on speed, handling, and braking. We will present to you
          your <span className="mono" style={{ color: "var(--hot)" }}>Best Value</span> match, the
          highest avg performance per dollar, with all alternatives below.
        </Reveal>
      </div>

      <Reveal>
        <div className="discovery-shell">
          {/* STAGE: centerpiece car + radar */}
          <div className="stage-row">
            <div className="centerpiece">
              <div className="cp-meta">
                <div className="cp-tag"><span className="pulse"></span> Best Value Match</div>
                <div className="cp-id">{selected ? `ID · ${selected.id.toUpperCase()}` : "—"}</div>
              </div>

              <div className="cp-stage">
                {selected ? (
                  <div className="cp-render" key={selected.id}>
                    <CarRender code={selected.id.toUpperCase()} status="LIVE MATCH" angle="HERO / 3-4 FRONT" car={selected} />
                    <div className="cp-bubble top-left">
                      <span className="accent">SPD</span>{selected.speed}
                    </div>
                    <div className="cp-bubble top-right">
                      <span className="accent">HND</span>{selected.handling}
                    </div>
                    <div className="cp-bubble bot-left">
                      <span className="accent">BRK</span>{selected.braking}
                    </div>
                  </div>
                ) : (
                  <div style={{ fontFamily: "var(--mono)", color: "var(--text-3)", fontSize: 12, letterSpacing: "0.2em", textTransform: "uppercase" }}>
                    — No match in current scale —
                  </div>
                )}
              </div>

              <div className="cp-foot">
                <div>
                  <div className="cp-maker">{selected ? `${selected.maker} · ${selected.cls}` : "—"}</div>
                  <div className="cp-name">{selected ? selected.name : "Adjust filters"}</div>
                </div>
                <div className="cp-price-block">
                  <div className="cp-price-lbl">Sticker</div>
                  <div className="cp-price">{selected ? fmtPrice(selected.price) : "—"}</div>
                  <div className="cp-vps">{selected ? `${selected.value.toFixed(1)} score / $M` : ""}</div>
                </div>
              </div>
            </div>

            {/* RIGHT: spec / radar */}
            <div className="spec-panel">
              <div className="spec-head">
                <span className="title">Performance Profile</span>
                <span className="sub">0–100 INDEX</span>
              </div>
              <div className="radar-wrap">
                <RadarChart car={selected} />
              </div>
              <div className="spec-stats">
                <div className="ss"><span className="l">Top Speed</span><span className="v">{selected ? selected.speed : "—"}</span></div>
                <div className="ss"><span className="l">Accel</span><span className="v">{selected ? selected.accel : "—"}</span></div>
                <div className="ss"><span className="l">Handling</span><span className="v">{selected ? selected.handling : "—"}</span></div>
                <div className="ss"><span className="l">Braking</span><span className="v">{selected ? selected.braking : "—"}</span></div>
              </div>
            </div>
          </div>

          {/* SLIDERS row */}
          <div className="slider-row">
            <div className="slider-head-block">
              <span className="t">Configure your scale</span>
              <button className="reset" onClick={reset}>Reset filters</button>
            </div>
            <Scrubber icon="$" label="Max Price" min={0} max={10000000} step={100000}
              value={s.priceMax} onChange={v => update("priceMax", v)} format={fmtPrice} ticks={10} />
            <Scrubber icon="V" label="Min Speed" min={0} max={100} step={1}
              value={s.speedMin} onChange={v => update("speedMin", v)} ticks={10} />
            <Scrubber icon="H" label="Min Handling" min={0} max={100} step={1}
              value={s.handlingMin} onChange={v => update("handlingMin", v)} ticks={10} />
            <Scrubber icon="B" label="Min Braking" min={0} max={100} step={1}
              value={s.brakingMin} onChange={v => update("brakingMin", v)} ticks={10} />
          </div>

          {/* ALTERNATIVES */}
          <div className="alt-row">
            <div className="alt-head">
              <span className="t">Alternatives in scale</span>
              <span className="meta"><strong>{pad(results.length, 2)}</strong> matches · sorted by {sortBy}</span>
              <div className="sort">
                {["value", "price", "speed"].map(k => (
                  <button key={k} className={sortBy === k ? "active" : ""} onClick={() => setSortBy(k)}>
                    {k}
                  </button>
                ))}
              </div>
            </div>
            <div className="alt-grid">
              {results.length === 0 && <div className="empty">— No vehicles match the current scale —</div>}
              {results.map((c, i) => (
                <AltCard
                  key={c.id}
                  car={c}
                  idx={i}
                  selected={selected && selected.id === c.id}
                  onClick={() => setSelectedId(c.id)}
                />
              ))}
            </div>
          </div>
        </div>
      </Reveal>
    </section>
  );
}

function AltCard({ car, idx, selected, onClick }) {
  return (
    <div
      className={`alt-card ${selected ? "selected" : ""}`}
      style={{ animationDelay: `${Math.min(idx * 14, 240)}ms` }}
      onClick={onClick}
    >
      <div className="alt-render">
        <CarRender code={car.id.toUpperCase()} status="MATCH" angle="" car={car} />
      </div>
      <div className="alt-name">{car.name}</div>
      <div className="alt-row-meta">
        <span className="alt-cls">{car.cls}</span>
        <span className="alt-price">{fmtPrice(car.price)}</span>
      </div>
      <div className="alt-stats">
        <span className="x"><b>S</b>{car.speed}</span>
        <span className="x"><b>H</b>{car.handling}</span>
        <span className="x"><b>B</b>{car.braking}</span>
      </div>
    </div>
  );
}

Object.assign(window, { Classes, Discovery, AltCard, RadarChart });

/* ============================================================
   App Root — orchestrates sections + active-section nav state
   ============================================================ */

function App() {
  const [active, setActive] = useState("hero");

  useEffect(() => {
    const ids = ["hero", "paradox", "classes", "discovery"];
    const onScroll = () => {
      const y = window.scrollY + 120;
      let cur = ids[0];
      for (const id of ids) {
        const el = document.getElementById(id);
        if (el && el.offsetTop <= y) cur = id;
      }
      setActive(cur);
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const begin = () => {
    const el = document.getElementById("paradox");
    if (el) window.scrollTo({ top: el.offsetTop - 56, behavior: "smooth" });
  };

  return (
    <>
      <div className="scanline"></div>
      <TopBar active={active} />
      <main>
        <Hero onBegin={begin} />
        <Paradox />
        <Classes />
        <Discovery />
      </main>
      <footer className="foot">
        <span>VELOCITY INDEX · DB-NODE / 546 VEHICLES</span>
        <span>BUILD 5.0426 · INTERNAL RESEARCH USE</span>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
